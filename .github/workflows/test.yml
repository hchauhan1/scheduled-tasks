name: Test Setup

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets are configured
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          VONAGE_API_SECRET: ${{ secrets.VONAGE_API_SECRET }}
          VONAGE_API_KEY: ${{ secrets.VONAGE_API_KEY }}
          VONAGE_NUMBER: ${{ secrets.VONAGE_NUMBER }}
          PRIVATE_NUMBER: ${{ secrets.PRIVATE_NUMBER }}
        run: |
          if [ -z "$WEATHER_API_KEY" ]; then
            echo "WEATHER_API_KEY secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "WEATHER_API_KEY is configured"
          fi

          if [ -z "$VONAGE_API_SECRET" ]; then
            echo "VONAGE_API_SECRET secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "VONAGE_API_SECRET is configured"
          fi

          if [ -z "$VONAGE_API_KEY" ]; then
            echo "VONAGE_API_KEY secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "VONAGE_API_KEY is configured"
          fi

          if [ -z "$VONAGE_NUMBER" ]; then
            echo "VONAGE_NUMBER secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "VONAGE_NUMBER is configured"
          fi

          if [ -z "$PRIVATE_NUMBER" ]; then
            echo "PRIVATE_NUMBER secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "PRIVATE_NUMBER is configured"
          fi

          echo ""
          echo "All secrets are configured!"

      - name: Check required files exist
        run: |
          echo "Checking for required files..."

          if [ -f "main.py" ]; then
            echo "main.py found"
          else
            echo "main.py not found!"
            exit 1
          fi

          if [ -f "requirements.txt" ]; then
            echo "requirements.txt found"
          else
            echo "requirements.txt not found!"
            exit 1
          fi

          echo ""
          echo "All required files found!"

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "Python syntax OK"

      - name: Success
        run: |
          echo ""
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
